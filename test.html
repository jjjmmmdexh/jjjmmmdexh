<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Client · 双源壁纸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#007bff',
                        secondary: '#6c757d',
                        dark: '#343a40',
                        light: '#f8f9fa',
                        bilibili: '#00A1D6'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .device-card {
                /* 亚克力/毛玻璃效果 */
                @apply bg-white/80 dark:bg-gray-800/80 backdrop-blur-md rounded-xl shadow-md p-6 transition-all duration-300 hover:shadow-lg border border-white/20 dark:border-gray-700/20;
            }
            .btn-primary {
                /* 亚克力下载按钮 */
                @apply bg-primary/70 hover:bg-primary/80 text-white font-medium py-3 px-8 rounded-full transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-primary/50 backdrop-blur-md border border-white/20 dark:border-primary/30;
            }
            .section-padding {
                @apply py-8 md:py-12;
            }
            .contact-card {
                /* 亚克力效果 */
                @apply bg-gradient-to-r from-blue-50/80 to-indigo-50/80 dark:from-gray-700/80 dark:to-gray-600/80 backdrop-blur-md rounded-xl shadow-md p-6 border border-blue-100/30 dark:border-gray-600/30;
            }
            
            /* 圆形按钮（黑夜/通知） */
            .circle-btn {
                @apply fixed top-4 z-50 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md text-gray-800 dark:text-gray-200 w-12 h-12 flex items-center justify-center rounded-full shadow-lg hover:shadow-xl transition-all duration-300 border border-gray-200/30 dark:border-gray-600/30;
            }
            
            /* 通知栏动画 */
            .notification-panel {
                @apply fixed top-16 right-4 z-40 bg-white/90 dark:bg-gray-800/90 backdrop-blur-md rounded-xl shadow-xl p-5 border border-gray-200/30 dark:border-gray-700/30 max-w-xs opacity-0 invisible;
                transform: translateX(20px) rotate(2deg) scale(0.95);
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }
            
            .notification-panel.open {
                @apply opacity-100 visible;
                transform: translateX(0) rotate(0deg) scale(1);
            }
            
            .notification-panel.closing {
                transform: translateX(20px) rotate(-2deg) scale(0.95);
                @apply opacity-0 invisible;
            }
            
            .dark-bg {
                @apply bg-gray-50 dark:bg-gray-900 transition-colors duration-300;
            }
            
            .dark-text {
                @apply text-gray-700 dark:text-gray-300;
            }
            
            .dark-text-secondary {
                @apply text-secondary dark:text-gray-400;
            }
            
            .dark-info-bg {
                @apply bg-gray-50/80 dark:bg-gray-700/80 backdrop-blur-md;
            }
            
            .dark-contact-item {
                @apply bg-white/80 dark:bg-gray-700/80 backdrop-blur-sm shadow-sm dark:shadow-gray-800 border border-white/20 dark:border-gray-800/20 rounded-lg;
            }
            
            .icon-bg {
                @apply bg-blue-100/80 dark:bg-blue-800/80 backdrop-blur-sm w-12 h-12 flex items-center justify-center rounded-full mr-3;
            }
            
            .icon-color {
                @apply text-blue-600 dark:text-blue-300 text-xl;
            }
            
            /* 背景壁纸样式 */
            .bg-wallpaper {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1;
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                filter: brightness(0.85) contrast(1.05);
                transition: filter 0.5s ease;
            }
            
            .dark .bg-wallpaper {
                filter: brightness(0.7) contrast(1.1);
            }
            
            /* 壁纸信息卡片 — 重新设计以容纳切换按钮 */
            .wallpaper-info {
                @apply bg-black/60 backdrop-blur-md text-white p-4 rounded-lg text-sm md:text-base max-w-3xl mx-auto mt-6 mb-8;
            }
            
            /* 雪花效果 */
            .snowflake {
                position: fixed;
                pointer-events: none;
                z-index: 9999;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.8);
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            
            .dark .snowflake {
                background: rgba(255, 255, 255, 0.9);
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
            }
            
            .contributor-card {
                @apply bg-white/80 dark:bg-gray-700/80 backdrop-blur-md rounded-xl shadow-md p-4 transition-all duration-300 hover:shadow-lg hover:scale-105 border border-white/20 dark:border-gray-600/20;
            }
            
            .contributor-avatar {
                @apply w-16 h-16 md:w-20 md:h-20 rounded-full object-cover border-2 border-white/40 dark:border-gray-600/40 mx-auto mb-3;
            }
            
            .contributor-name {
                @apply text-center font-medium text-gray-800 dark:text-gray-200 truncate;
            }
            
            .time-display {
                @apply text-gray-600 dark:text-gray-400 text-sm font-medium;
            }
            
            /* 源切换按钮风格 */
            .source-btn {
                @apply px-3 py-1 text-xs rounded-full bg-white/20 hover:bg-white/30 transition-all backdrop-blur-sm border border-white/10;
            }
            .source-btn.active {
                @apply bg-primary/60 hover:bg-primary/70 border-white/30 ring-2 ring-white/20;
            }
        }
    </style>
    <script>
        // --- 全局变量 ---
        let notificationOpen = false;
        let notificationTimer = null;
        let isProcessingNotification = false;

        // 雪花效果
        let snowflakes = [];
        let snowflakeIdCounter = 0;

        // 壁纸当前源 ('bing' 或 'yuanmeng')
        let currentSource = 'bing';

        // 贡献者列表
        const contributors = [
            { name: '凋灵斯拉是个up主', image: '凋灵斯拉是个up主.jpg' },
            { name: 'TOM', image: 'TOM.jpg' },
            { name: 'Ternus340', image: 'Ternus340.jpg' },
            { name: 'Xigua', image: 'Xigua.jpg' },
            { name: 'CB604BL', image: 'CB604BL.jpg' },
            { name: 'Sunch233', image: 'Sunch233.jpg' },
            { name: 'NEETSama', image: 'NEETSama.jpg' },
            { name: 'asosa', image: 'asosa.jpg' }
        ];

        // --- 黑夜模式 ---
        function initDarkMode() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            updateToggleIcon();
            updateWallpaperFilter();
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.contains('dark');
            if (isDark) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            updateToggleIcon();
            updateWallpaperFilter();
        }
        
        function updateToggleIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            const toggleIcon = document.getElementById('darkModeIcon');
            if (toggleIcon) {
                toggleIcon.className = isDark ? 'fa fa-sun-o' : 'fa fa-moon-o';
            }
        }
        
        function updateWallpaperFilter() {
            const wallpaper = document.getElementById('bgWallpaper');
            if (!wallpaper) return;
            const isDark = document.documentElement.classList.contains('dark');
            wallpaper.style.filter = isDark ? 'brightness(0.7) contrast(1.1)' : 'brightness(0.85) contrast(1.05)';
        }

        // --- 壁纸加载函数 ---

        // 加载Bing每日壁纸 (原逻辑)
        async function loadBingWallpaper() {
            const captionDiv = document.getElementById('wallpaperCaption');
            const sourceLabel = document.getElementById('wallpaperSourceLabel');
            try {
                const response = await fetch('https://bing.biturl.top/?resolution=1920&format=json&index=0&mkt=zh-CN');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data && data.url) {
                    document.getElementById('bgWallpaper').style.backgroundImage = `url(${data.url})`;
                    if (captionDiv) {
                        captionDiv.innerHTML = `
                            <p class="font-medium mb-1"><i class="fa fa-camera mr-2"></i>📷 Bing 每日壁纸</p>
                            <p>${data.copyright || '无版权信息'}</p>
                            ${data.copyrightLink ? `<p class="mt-2"><a href="${data.copyrightLink}" target="_blank" class="text-blue-300 hover:text-blue-200 underline">查看原图</a></p>` : ''}
                        `;
                    }
                    if (sourceLabel) sourceLabel.innerText = '当前源: Bing';
                } else {
                    throw new Error('无效的Bing数据');
                }
            } catch (error) {
                console.error('Bing壁纸加载失败:', error);
                document.getElementById('bgWallpaper').style.backgroundImage = 'url(https://picsum.photos/1920/1080?random=1)';
                if (captionDiv) {
                    captionDiv.innerHTML = `<p class="font-medium mb-1"><i class="fa fa-exclamation-triangle mr-2"></i>Bing壁纸加载失败，使用随机占位</p>`;
                }
            } finally {
                updateWallpaperFilter();
            }
        }

        // 加载远梦API壁纸 (直接使用提供的端点)
        function loadYuanmengWallpaper() {
            const captionDiv = document.getElementById('wallpaperCaption');
            const sourceLabel = document.getElementById('wallpaperSourceLabel');
            const wallpaperDiv = document.getElementById('bgWallpaper');
            // 添加时间戳防止缓存
            const apiUrl = `https://api.mmp.cc/api/pcwallpaper?category=&type=&_=${Date.now()}`;
            
            // 使用图片预加载方式，确保图片有效再设置背景
            const img = new Image();
            img.onload = function() {
                wallpaperDiv.style.backgroundImage = `url('${apiUrl}')`;
                if (captionDiv) {
                    captionDiv.innerHTML = `
                        <p class="font-medium mb-1"><i class="fa fa-picture-o mr-2"></i>🌈 远梦·随机壁纸</p>
                        <p>来源：远梦API (mmp.cc)  | 随机风景/抽象</p>
                        <p class="text-xs opacity-70 mt-1">每次切换随机刷新</p>
                    `;
                }
                if (sourceLabel) sourceLabel.innerText = '当前源: 远梦';
                updateWallpaperFilter();
            };
            img.onerror = function() {
                console.error('远梦壁纸加载失败，回退Bing');
                // 加载失败时切回Bing并提示
                if (captionDiv) {
                    captionDiv.innerHTML = `<p class="font-medium mb-1"><i class="fa fa-exclamation-circle mr-2"></i>远梦壁纸暂时不可用，自动切回Bing</p>`;
                }
                // 切回Bing源（但不改变currentSource? 为了避免递归，暂时先加载Bing）
                loadBingWallpaper();
                // 同时更新按钮状态，因为源实际上被重置为Bing了
                setActiveSourceButton('bing');
                currentSource = 'bing';
                if (sourceLabel) sourceLabel.innerText = '当前源: Bing (自动回退)';
            };
            img.src = apiUrl; // 开始加载
        }

        // --- 源切换控制 ---
        function setActiveSourceButton(source) {
            const btnBing = document.getElementById('btnBingSource');
            const btnYuan = document.getElementById('btnYuanmengSource');
            if (!btnBing || !btnYuan) return;
            if (source === 'bing') {
                btnBing.classList.add('active');
                btnYuan.classList.remove('active');
            } else {
                btnYuan.classList.add('active');
                btnBing.classList.remove('active');
            }
        }

        function switchToBing() {
            if (currentSource === 'bing') return;
            currentSource = 'bing';
            setActiveSourceButton('bing');
            loadBingWallpaper();
        }

        function switchToYuanmeng() {
            if (currentSource === 'yuanmeng') return;
            currentSource = 'yuanmeng';
            setActiveSourceButton('yuanmeng');
            loadYuanmengWallpaper();
        }

        // --- 通知栏 ---
        function toggleNotification() {
            if (isProcessingNotification) return;
            isProcessingNotification = true;

            const panel = document.getElementById('notificationPanel');
            const icon = document.getElementById('notificationIcon');
            
            clearTimeout(notificationTimer);
            
            if (notificationOpen) {
                panel.classList.add('closing');
                icon.classList.remove('fa-bell-slash');
                icon.classList.add('fa-bell');
                
                setTimeout(() => {
                    panel.classList.remove('open', 'closing');
                    notificationOpen = false;
                    isProcessingNotification = false;
                }, 400);
            } else {
                panel.classList.add('open');
                icon.classList.remove('fa-bell');
                icon.classList.add('fa-bell-slash');
                
                notificationTimer = setTimeout(() => {
                    toggleNotification();
                }, 8000);
                
                notificationOpen = true;
                isProcessingNotification = false;
            }
        }

        // 点击外部关闭通知
        document.addEventListener('click', function(event) {
            const panel = document.getElementById('notificationPanel');
            const toggleBtn = document.getElementById('notificationToggle');
            if (notificationOpen && !isProcessingNotification &&
                !panel.contains(event.target) && 
                event.target !== toggleBtn && 
                !toggleBtn.contains(event.target)) {
                toggleNotification();
            }
        });

        // --- 雪花效果 ---
        function createSnowflake(x, y) {
            const size = Math.random() * 5 + 3;
            const id = `snowflake-${snowflakeIdCounter++}`;
            
            const snowflake = document.createElement('div');
            snowflake.id = id;
            snowflake.className = 'snowflake';
            snowflake.style.width = `${size}px`;
            snowflake.style.height = `${size}px`;
            snowflake.style.left = `${x}px`;
            snowflake.style.top = `${y}px`;
            snowflake.style.opacity = '1';
            
            document.body.appendChild(snowflake);
            
            const info = {
                id, element: snowflake, x, y, size,
                velocityX: (Math.random() - 0.5) * 2,
                velocityY: Math.random() * 1 + 1,
                rotation: Math.random() * 360,
                rotationSpeed: (Math.random() - 0.5) * 2
            };
            snowflakes.push(info);
            
            setTimeout(() => removeSnowflake(id), 5000);
        }

        function updateSnowflakes() {
            for (let i = snowflakes.length - 1; i >= 0; i--) {
                const s = snowflakes[i];
                s.x += s.velocityX;
                s.y += s.velocityY;
                s.rotation += s.rotationSpeed;
                s.element.style.left = `${s.x}px`;
                s.element.style.top = `${s.y}px`;
                s.element.style.transform = `rotate(${s.rotation}deg)`;
                const life = 1 - (s.y / window.innerHeight);
                s.element.style.opacity = life > 0 ? life : 0;
                if (s.y > window.innerHeight) removeSnowflake(s.id);
            }
            requestAnimationFrame(updateSnowflakes);
        }

        function removeSnowflake(id) {
            snowflakes = snowflakes.filter(s => s.id !== id);
            const el = document.getElementById(id);
            if (el) {
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 300);
            }
        }

        function handleClick(event) {
            if (event.target.closest('#darkModeToggle') || event.target.closest('#notificationToggle')) return;
            const count = Math.floor(Math.random() * 6) + 5;
            for (let i = 0; i < count; i++) {
                const offsetX = (Math.random() - 0.5) * 20;
                const offsetY = (Math.random() - 0.5) * 20;
                createSnowflake(event.clientX + offsetX, event.clientY + offsetY);
            }
        }

        // --- 时间显示 ---
        function updateTime() {
            const timeElement = document.getElementById('currentTime');
            if (!timeElement) return;
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekday = weekdays[now.getDay()];
            timeElement.innerHTML = `<i class="fa fa-clock-o mr-1"></i> ${year}-${month}-${day} ${weekday} ${hours}:${minutes}:${seconds}`;
        }

        // --- 渲染贡献者 ---
        function renderContributors() {
            const container = document.getElementById('contributorsList');
            if (!container) return;
            container.innerHTML = '';
            contributors.forEach(c => {
                const card = document.createElement('div');
                card.className = 'contributor-card';
                card.innerHTML = `
                    <div class="text-center">
                        <img src="${c.image}" alt="${c.name}" class="contributor-avatar" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHZpZXdCb3g9IjAgMCA4MCA4MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjgwIiBoZWlnaHQ9IjgwIiByeD0iNDAiIGZpbGw9IiM0Njg1RkYiLz4KPHBhdGggZD0iTTQwIDI2LjY2NzdDNDQuNjA2IDI2LjY2NzcgNDguMzMzNiAzMC4zOTQ0IDQ4LjMzMzYgMzVWNDEuNjY3N0MzOC4zMzM2IDQzLjMzNDQgMjYuNjY2OSA0NC4xNjcxIDI2LjY2NjkgNDRWNDMuMzM0NEMyNi42NjY5IDQwLjI2NzcgMjUuMzMzNiAzNy4yMDA4IDI1LjMzMzYgMzVDMjUuMzMzNiAzMC4zOTQ0IDI5LjA2MDIgMjYuNjY3NyAzMy42NjY5IDI2LjY2NzdINDBaTTU1LjYwMDIgNTcuMzM0NEgyNC4zMzM2QzI3LjM2NjkgNTIuMzMzNyAzMy4wNjY5IDQ4LjMzMzcgNDAgNDguMzMzN0M0Ni45MzM2IDQ4LjMzMzcgNTIuNjY2OSA1Mi4zMzM3IDU1LjYwMDIgNTcuMzMzNFY1Ny4zMzQ0WiIgZmlsbD0id2hpdGUiLz4KPC9zdmc+'; this.alt='${c.name} 头像'">
                        <p class="contributor-name">${c.name}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- 页面初始化 ---
        window.onload = async function() {
            initDarkMode();
            
            // 初始默认加载Bing壁纸
            await loadBingWallpaper();
            
            renderContributors();
            updateTime();
            setInterval(updateTime, 1000);
            
            // 事件绑定
            document.getElementById('darkModeToggle').addEventListener('click', toggleDarkMode);
            document.getElementById('notificationToggle').addEventListener('click', toggleNotification);
            document.getElementById('btnBingSource').addEventListener('click', switchToBing);
            document.getElementById('btnYuanmengSource').addEventListener('click', switchToYuanmeng);
            
            // 设置初始激活按钮
            setActiveSourceButton('bing');
            
            // 雪花效果
            document.addEventListener('click', handleClick);
            updateSnowflakes();
        };
    </script>
</head>

    <div id="bgWallpaper" class="bg-wallpaper"></div>
    
    <!-- 黑夜模式按钮 -->

    <!-- 通知栏 -->

        <section class="section-padding">

                    <div class="flex items-center p-3 dark-contact-item">
                        <div class="icon-bg"><i class="fa fa-qq icon-color"></i></div>
