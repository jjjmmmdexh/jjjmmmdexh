<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Client</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#007bff',
                        secondary: '#6c757d',
                        dark: '#343a40',
                        light: '#f8f9fa',
                        bilibili: '#00A1D6' // Bilibili品牌蓝色
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .device-card {
                /* 亚克力/毛玻璃效果 */
                @apply bg-white/80 dark:bg-gray-800/80 backdrop-blur-md rounded-xl shadow-md p-6 transition-all duration-300 hover:shadow-lg border border-white/20 dark:border-gray-700/20;
            }
            .btn-primary {
                /* 亚克力下载按钮 - 调整透明度+圆形 */
                @apply bg-primary/70 hover:bg-primary/80 text-white font-medium py-3 px-8 rounded-full transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-primary/50 backdrop-blur-md border border-white/20 dark:border-primary/30;
            }
            .section-padding {
                @apply py-8 md:py-12;
            }
            .contact-card {
                /* 亚克力/毛玻璃效果 */
                @apply bg-gradient-to-r from-blue-50/80 to-indigo-50/80 dark:from-gray-700/80 dark:to-gray-600/80 backdrop-blur-md rounded-xl shadow-md p-6 border border-blue-100/30 dark:border-gray-600/30;
            }
            
            /* 圆形按钮样式（黑夜模式+通知按钮） */
            .circle-btn {
                @apply fixed top-4 z-50 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md text-gray-800 dark:text-gray-200 w-12 h-12 flex items-center justify-center rounded-full shadow-lg hover:shadow-xl transition-all duration-300 border border-gray-200/30 dark:border-gray-600/30;
            }
            
            /* 通知栏样式 - 青柠起始页倾斜动画效果 */
            .notification-panel {
                @apply fixed top-16 right-4 z-40 bg-white/90 dark:bg-gray-800/90 backdrop-blur-md rounded-xl shadow-xl p-5 border border-gray-200/30 dark:border-gray-700/30 max-w-xs opacity-0 invisible;
                transform: translateX(20px) rotate(2deg) scale(0.95);
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }
            
            .notification-panel.open {
                @apply opacity-100 visible;
                transform: translateX(0) rotate(0deg) scale(1);
            }
            
            .notification-panel.closing {
                transform: translateX(20px) rotate(-2deg) scale(0.95);
                @apply opacity-0 invisible;
            }
            
            /* 黑夜模式下的背景和文字颜色 */
            .dark-bg {
                @apply bg-gray-50 dark:bg-gray-900 transition-colors duration-300;
            }
            
            .dark-text {
                @apply text-gray-700 dark:text-gray-300;
            }
            
            .dark-text-secondary {
                @apply text-secondary dark:text-gray-400;
            }
            
            .dark-info-bg {
                /* 亚克力/毛玻璃效果 */
                @apply bg-gray-50/80 dark:bg-gray-700/80 backdrop-blur-md;
            }
            
            .dark-contact-item {
                /* 亚克力/毛玻璃效果 */
                @apply bg-white/80 dark:bg-gray-700/80 backdrop-blur-sm shadow-sm dark:shadow-gray-800 border border-white/20 dark:border-gray-800/20 rounded-lg;
            }
            
            /* 统一的图标背景样式 */
            .icon-bg {
                @apply bg-blue-100/80 dark:bg-blue-800/80 backdrop-blur-sm w-12 h-12 flex items-center justify-center rounded-full mr-3;
            }
            
            /* 统一的图标颜色样式 */
            .icon-color {
                @apply text-blue-600 dark:text-blue-300 text-xl;
            }
            
            /* 背景壁纸样式 */
            .bg-wallpaper {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1;
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                filter: brightness(0.85) contrast(1.05);
                transition: filter 0.5s ease;
            }
            
            .dark .bg-wallpaper {
                filter: brightness(0.7) contrast(1.1);
            }
            
            /* 壁纸信息卡片样式 */
            .wallpaper-info {
                @apply bg-black/60 backdrop-blur-md text-white p-4 rounded-lg text-sm md:text-base max-w-3xl mx-auto mt-6 mb-8;
            }
            
            /* 雪花效果样式 */
            .snowflake {
                position: fixed;
                pointer-events: none;
                z-index: 9999;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.8);
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            
            .dark .snowflake {
                background: rgba(255, 255, 255, 0.9);
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
            }
            
            /* 贡献者卡片样式 */
            .contributor-card {
                @apply bg-white/80 dark:bg-gray-700/80 backdrop-blur-md rounded-xl shadow-md p-4 transition-all duration-300 hover:shadow-lg hover:scale-105 border border-white/20 dark:border-gray-600/20;
            }
            
            /* 贡献者头像样式 */
            .contributor-avatar {
                @apply w-16 h-16 md:w-20 md:h-20 rounded-full object-cover border-2 border-white/40 dark:border-gray-600/40 mx-auto mb-3;
            }
            
            /* 贡献者名字样式 */
            .contributor-name {
                @apply text-center font-medium text-gray-800 dark:text-gray-200 truncate;
            }
            
            /* 时间显示样式 */
            .time-display {
                @apply text-gray-600 dark:text-gray-400 text-sm font-medium;
            }
            
            /* Windows 10磁贴动态光效样式 */
            .tile-glow-container {
                position: relative;
                display: inline-block;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 10px 30px rgba(0, 123, 255, 0.2);
            }
            
            /* 磁贴基础样式 */
            .tile-base {
                position: relative;
                border-radius: 12px;
                overflow: hidden;
                transition: all 0.3s ease;
                z-index: 1;
            }
            
            /* 动态光效层 */
            .tile-glow {
                position: absolute;
                top: -50%;
                left: -50%;
                width: 200%;
                height: 200%;
                background: linear-gradient(
                    45deg,
                    transparent 30%,
                    rgba(255, 255, 255, 0.1) 50%,
                    transparent 70%
                );
                transform: rotate(0deg);
                animation: glowRotate 8s linear infinite;
                z-index: 0;
                filter: blur(10px);
                opacity: 0.6;
            }
            
            .dark .tile-glow {
                background: linear-gradient(
                    45deg,
                    transparent 30%,
                    rgba(0, 123, 255, 0.3) 50%,
                    transparent 70%
                );
                opacity: 0.4;
            }
            
            /* 磁贴边框光效 */
            .tile-border {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                border-radius: 12px;
                border: 2px solid transparent;
                background: linear-gradient(90deg, rgba(255,255,255,0.2), rgba(0,123,255,0.5), rgba(255,255,255,0.2)) border-box;
                -webkit-mask: 
                    linear-gradient(#fff 0 0) padding-box, 
                    linear-gradient(#fff 0 0);
                -webkit-mask-composite: destination-out;
                mask-composite: exclude;
                animation: borderGlow 3s ease-in-out infinite alternate;
                z-index: 2;
                pointer-events: none;
            }
            
            .dark .tile-border {
                background: linear-gradient(90deg, rgba(0,123,255,0.3), rgba(100,200,255,0.7), rgba(0,123,255,0.3)) border-box;
            }
            
            /* 光效动画 */
            @keyframes glowRotate {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
            
            @keyframes borderGlow {
                0% {
                    opacity: 0.4;
                    background-position: 0% 50%;
                }
                100% {
                    opacity: 0.8;
                    background-position: 100% 50%;
                }
            }
            
            /* 脉冲动画 */
            @keyframes pulseGlow {
                0%, 100% {
                    box-shadow: 
                        0 0 20px rgba(0, 123, 255, 0.2),
                        0 0 40px rgba(0, 123, 255, 0.1),
                        0 0 60px rgba(0, 123, 255, 0.05);
                }
                50% {
                    box-shadow: 
                        0 0 30px rgba(0, 123, 255, 0.4),
                        0 0 60px rgba(0, 123, 255, 0.2),
                        0 0 90px rgba(0, 123, 255, 0.1);
                }
            }
            
            .dark .tile-glow-container {
                animation: pulseGlow 4s ease-in-out infinite;
            }
            
            .tile-glow-container:hover {
                transform: scale(1.02);
                transition: transform 0.3s ease;
            }
            
            /* 响应式调整 */
            @media (max-width: 768px) {
                .tile-glow {
                    animation: glowRotate 12s linear infinite;
                }
                
                .tile-glow-container {
                    box-shadow: 0 8px 20px rgba(0, 123, 255, 0.15);
                }
            }
        }
    </style>
    <script>
        // 全局变量 - 防止通知反复弹出
        let notificationOpen = false;
        let notificationTimer = null;
        let isProcessingNotification = false;

        // 雪花效果相关变量
        let snowflakes = [];
        let snowflakeIdCounter = 0;

        // 贡献者列表数据
        const contributors = [
            { name: '凋灵斯拉是个up主', image: '凋灵斯拉是个up主.jpg' },
            { name: 'TOM', image: 'TOM.jpg' },
            { name: 'Ternus340', image: 'Ternus340.jpg' },
            { name: 'Xigua', image: 'Xigua.jpg' },
            { name: 'CB604BL', image: 'CB604BL.jpg' },
            { name: 'Sunch233', image: 'Sunch233.jpg' },
            { name: 'NEETSama', image: 'NEETSama.jpg' },
            { name: 'asosa', image: 'asosa.jpg' }
        ];

        // 黑夜模式相关函数
        function initDarkMode() {
            // 从localStorage获取保存的主题设置
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            // 如果有保存的设置就使用，否则使用系统偏好
            const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
            
            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            
            updateToggleIcon();
            updateWallpaperFilter(); // 更新壁纸滤镜
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.contains('dark');
            
            if (isDark) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            
            updateToggleIcon();
            updateWallpaperFilter(); // 更新壁纸滤镜
        }
        
        function updateToggleIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            const toggleIcon = document.getElementById('darkModeIcon');
            
            if (toggleIcon) {
                toggleIcon.className = isDark ? 'fa fa-sun-o' : 'fa fa-moon-o';
            }
        }
        
        // 更新壁纸滤镜效果
        function updateWallpaperFilter() {
            const wallpaper = document.getElementById('bgWallpaper');
            if (!wallpaper) return;
            
            const isDark = document.documentElement.classList.contains('dark');
            wallpaper.style.filter = isDark ? 'brightness(0.7) contrast(1.1)' : 'brightness(0.85) contrast(1.05)';
        }
        
        // 获取每日Bing壁纸
        async function getBingWallpaper() {
            try {
                // 使用跨域代理获取Bing壁纸API
                const response = await fetch('https://bing.biturl.top/?resolution=1920&format=json&index=0&mkt=zh-CN');
                
                if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
                
                const data = await response.json();
                
                if (data && data.url) {
                    // 设置背景壁纸
                    const wallpaper = document.getElementById('bgWallpaper');
                    wallpaper.style.backgroundImage = `url(${data.url})`;
                    
                    // 设置壁纸信息
                    const infoElement = document.getElementById('wallpaperInfo');
                    if (infoElement && data.copyright) {
                        infoElement.innerHTML = `
                            <p class="font-medium mb-1"><i class="fa fa-camera mr-2"></i>今日壁纸</p>
                            <p>${data.copyright}</p>
                            ${data.copyrightLink ? `<p class="mt-2"><a href="${data.copyrightLink}" target="_blank" class="text-blue-300 hover:text-blue-200 underline">查看原图</a></p>` : ''}
                        `;
                    }
                }
            } catch (error) {
                console.error('获取Bing壁纸失败:', error);
                // 备用壁纸
                const wallpaper = document.getElementById('bgWallpaper');
                wallpaper.style.backgroundImage = 'url(https://picsum.photos/1920/1080?random=1)';
                
                const infoElement = document.getElementById('wallpaperInfo');
                infoElement.innerHTML = `
                    <p class="font-medium mb-1"><i class="fa fa-camera mr-2"></i>今日壁纸</p>
                    <p>每日Bing壁纸加载失败，显示备用壁纸</p>
                `;
            }
        }
        
        // 渲染贡献者列表
        function renderContributors() {
            const container = document.getElementById('contributorsList');
            if (!container) return;
            
            // 清空容器
            container.innerHTML = '';
            
            // 为每个贡献者创建卡片
            contributors.forEach(contributor => {
                const contributorCard = document.createElement('div');
                contributorCard.className = 'contributor-card';
                
                // 创建头像 - 添加错误处理，如果图片不存在则显示默认头像
                contributorCard.innerHTML = `
                    <div class="text-center">
                        <img 
                            src="${contributor.image}" 
                            alt="${contributor.name}" 
                            class="contributor-avatar"
                            onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHZpZXdCb3g9IjAgMCA4MCA4MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjgwIiBoZWlnaHQ9IjgwIiByeD0iNDAiIGZpbGw9IiM0Njg1RkYiLz4KPHBhdGggZD0iTTQwIDI2LjY2NzdDNDQuNjA2IDI2LjY2NzcgNDguMzMzNiAzMC4zOTQ0IDQ4LjMzMzYgMzVWNDEuNjY3N0MzOC4zMzM2IDQzLjMzNDQgMjYuNjY2OSA0NC4xNjcxIDI2LjY2NjkgNDRWNDMuMzM0NEMyNi42NjY5IDQwLjI2NzcgMjUuMzMzNiAzNy4yMDA4IDI1LjMzMzYgMzVDMjUuMzMzNiAzMC4zOTQ0IDI5LjA2MDIgMjYuNjY3NyAzMy42NjY5IDI2LjY2NzdINDBaTTU1LjYwMDIgNTcuMzM0NEgyNC4zMzM2QzI3LjM2NjkgNTIuMzMzNyAzMy4wNjY5IDQ4LjMzMzcgNDAgNDguMzMzN0M0Ni45MzM2IDQ4LjMzMzcgNTIuNjY2OSA1Mi4zMzM3IDU1LjYwMDIgNTcuMzMzNFY1Ny4zMzQ0WiIgZmlsbD0id2hpdGUiLz4KPC9zdmc+'; this.alt='${contributor.name} 头像加载失败'"
                        />
                        <p class="contributor-name">${contributor.name}</p>
                    </div>
                `;
                
                container.appendChild(contributorCard);
            });
        }
        
        // 更新时间显示
        function updateTime() {
            const timeElement = document.getElementById('currentTime');
            if (!timeElement) return;
            
            const now = new Date();
            
            // 格式化日期和时间
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            // 星期几
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekday = weekdays[now.getDay()];
            
            // 更新时间显示
            timeElement.innerHTML = `
                <i class="fa fa-clock-o mr-1"></i> ${year}-${month}-${day} ${weekday} ${hours}:${minutes}:${seconds}
            `;
        }
        
        // 通知栏相关函数 - 修复反复弹出问题
        function toggleNotification() {
            // 防止快速重复点击
            if (isProcessingNotification) return;
            isProcessingNotification = true;

            const panel = document.getElementById('notificationPanel');
            const icon = document.getElementById('notificationIcon');
            
            // 清除自动关闭定时器
            clearTimeout(notificationTimer);
            
            if (notificationOpen) {
                // 关闭通知栏 - 反向倾斜动画
                panel.classList.add('closing');
                icon.classList.remove('fa-bell-slash');
                icon.classList.add('fa-bell');
                
                setTimeout(() => {
                    panel.classList.remove('open', 'closing');
                    notificationOpen = false;
                    isProcessingNotification = false;
                }, 400);
            } else {
                // 打开通知栏 - 倾斜动画
                panel.classList.add('open');
                icon.classList.remove('fa-bell');
                icon.classList.add('fa-bell-slash');
                
                // 自动关闭（8秒）
                notificationTimer = setTimeout(() => {
                    toggleNotification();
                }, 8000);
                
                notificationOpen = true;
                isProcessingNotification = false;
            }
        }
        
        // 点击页面其他区域关闭通知栏
        document.addEventListener('click', function(event) {
            const panel = document.getElementById('notificationPanel');
            const toggleBtn = document.getElementById('notificationToggle');
            
            if (notificationOpen && !isProcessingNotification &&
                !panel.contains(event.target) && 
                event.target !== toggleBtn && 
                !toggleBtn.contains(event.target)) {
                toggleNotification();
            }
        });

        // ==================== 雪花效果相关函数 ====================
        function createSnowflake(x, y) {
            // 生成随机大小的雪花 (3-8px)
            const size = Math.random() * 5 + 3;
            const id = `snowflake-${snowflakeIdCounter++}`;
            
            // 创建雪花元素
            const snowflake = document.createElement('div');
            snowflake.id = id;
            snowflake.className = 'snowflake';
            snowflake.style.width = `${size}px`;
            snowflake.style.height = `${size}px`;
            snowflake.style.left = `${x}px`;
            snowflake.style.top = `${y}px`;
            snowflake.style.opacity = '1';
            
            // 添加到页面
            document.body.appendChild(snowflake);
            
            // 存储雪花信息
            const snowflakeInfo = {
                id,
                element: snowflake,
                x,
                y,
                size,
                velocityX: (Math.random() - 0.5) * 2, // 水平速度 (-1 到 1)
                velocityY: Math.random() * 1 + 1,      // 垂直速度 (1 到 2)
                rotation: Math.random() * 360,         // 初始旋转角度
                rotationSpeed: (Math.random() - 0.5) * 2 // 旋转速度 (-1 到 1)
            };
            
            snowflakes.push(snowflakeInfo);
            
            // 5秒后移除雪花
            setTimeout(() => {
                removeSnowflake(id);
            }, 5000);
            
            return snowflakeInfo;
        }

        function updateSnowflakes() {
            // 更新所有雪花的位置和状态
            for (let i = snowflakes.length - 1; i >= 0; i--) {
                const snowflake = snowflakes[i];
                
                // 更新位置
                snowflake.x += snowflake.velocityX;
                snowflake.y += snowflake.velocityY;
                
                // 更新旋转
                snowflake.rotation += snowflake.rotationSpeed;
                
                // 应用样式
                snowflake.element.style.left = `${snowflake.x}px`;
                snowflake.element.style.top = `${snowflake.y}px`;
                snowflake.element.style.transform = `rotate(${snowflake.rotation}deg)`;
                
                // 淡出效果
                const lifeProgress = 1 - (snowflake.y / window.innerHeight);
                snowflake.element.style.opacity = lifeProgress > 0 ? lifeProgress : 0;
                
                // 如果雪花超出屏幕底部，移除它
                if (snowflake.y > window.innerHeight) {
                    removeSnowflake(snowflake.id);
                }
            }
            
            // 继续更新
            requestAnimationFrame(updateSnowflakes);
        }

        function removeSnowflake(id) {
            // 从数组中移除
            snowflakes = snowflakes.filter(s => s.id !== id);
            
            // 从DOM中移除
            const element = document.getElementById(id);
            if (element) {
                element.style.opacity = '0';
                setTimeout(() => {
                    element.remove();
                }, 300);
            }
        }

        function handleClick(event) {
            // 防止在通知按钮/暗色模式按钮上点击时触发
            const target = event.target;
            if (target.closest('#darkModeToggle') || target.closest('#notificationToggle')) {
                return;
            }
            
            // 在点击位置创建多个雪花 (5-10个)
            const count = Math.floor(Math.random() * 6) + 5;
            for (let i = 0; i < count; i++) {
                // 稍微偏移位置，让雪花散开
                const offsetX = (Math.random() - 0.5) * 20;
                const offsetY = (Math.random() - 0.5) * 20;
                createSnowflake(event.clientX + offsetX, event.clientY + offsetY);
            }
        }
        
        window.onload = async function() {
            // 初始化黑夜模式
            initDarkMode();
            
            // 加载Bing壁纸
            await getBingWallpaper();
            
            // 渲染贡献者列表
            renderContributors();
            
            // 初始化时间显示并每秒更新
            updateTime();
            setInterval(updateTime, 1000);
            
            // 添加事件监听
            document.getElementById('darkModeToggle').addEventListener('click', toggleDarkMode);
            document.getElementById('notificationToggle').addEventListener('click', toggleNotification);
            
            // 初始化雪花效果
            document.addEventListener('click', handleClick);
            updateSnowflakes();
        };
