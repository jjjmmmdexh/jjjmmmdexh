<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Client</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#007bff',
                        secondary: '#6c757d',
                        dark: '#343a40',
                        light: '#f8f9fa',
                        bilibili: '#00A1D6'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .device-card {
                @apply bg-white/80 dark:bg-gray-800/80 backdrop-blur-md rounded-xl shadow-md p-6 transition-all duration-300 hover:shadow-lg border border-white/20 dark:border-gray-700/20;
            }
            .btn-primary {
                @apply bg-primary/70 hover:bg-primary/80 text-white font-medium py-3 px-8 rounded-full transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-primary/50 backdrop-blur-md border border-white/20 dark:border-primary/30;
            }
            .section-padding {
                @apply py-8 md:py-12;
            }
            .contact-card {
                @apply bg-gradient-to-r from-blue-50/80 to-indigo-50/80 dark:from-gray-700/80 dark:to-gray-600/80 backdrop-blur-md rounded-xl shadow-md p-6 border border-blue-100/30 dark:border-gray-600/30;
            }
            .circle-btn {
                @apply fixed top-4 z-50 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md text-gray-800 dark:text-gray-200 w-12 h-12 flex items-center justify-center rounded-full shadow-lg hover:shadow-xl transition-all duration-300 border border-gray-200/30 dark:border-gray-600/30;
            }
            .time-btn {
                @apply font-mono text-sm md:text-base tracking-wider;
                min-width: 120px;
                width: auto;
                padding: 0 1rem;
            }
            .notification-panel {
                @apply fixed top-16 right-4 z-40 bg-white/90 dark:bg-gray-800/90 backdrop-blur-md rounded-xl shadow-xl p-5 border border-gray-200/30 dark:border-gray-700/30 max-w-xs opacity-0 invisible;
                transform: translateX(20px) rotate(2deg) scale(0.95);
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }
            .notification-panel.open {
                @apply opacity-100 visible;
                transform: translateX(0) rotate(0deg) scale(1);
            }
            .notification-panel.closing {
                transform: translateX(20px) rotate(-2deg) scale(0.95);
                @apply opacity-0 invisible;
            }
            .dark-bg {
                @apply bg-gray-50 dark:bg-gray-900 transition-colors duration-300;
            }
            .dark-text {
                @apply text-gray-700 dark:text-gray-300;
            }
            .dark-text-secondary {
                @apply text-secondary dark:text-gray-400;
            }
            .dark-info-bg {
                @apply bg-gray-50/80 dark:bg-gray-700/80 backdrop-blur-md;
            }
            .dark-contact-item {
                @apply bg-white/80 dark:bg-gray-700/80 backdrop-blur-sm shadow-sm dark:shadow-gray-800 border border-white/20 dark:border-gray-800/20 rounded-lg;
            }
            .icon-bg {
                @apply bg-blue-100/80 dark:bg-blue-800/80 backdrop-blur-sm w-12 h-12 flex items-center justify-center rounded-full mr-3;
            }
            .icon-color {
                @apply text-blue-600 dark:text-blue-300 text-xl;
            }
            .bg-wallpaper {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1;
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                filter: brightness(0.85) contrast(1.05);
                transition: filter 0.5s ease;
                opacity: 0;
                transform: scale(1.05);
                transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }
            .bg-wallpaper.loaded {
                opacity: 1;
                transform: scale(1);
            }
            .dark .bg-wallpaper {
                filter: brightness(0.7) contrast(1.1);
            }
            .wallpaper-info {
                @apply bg-black/60 backdrop-blur-md text-white p-4 rounded-lg text-sm md:text-base max-w-3xl mx-auto mt-6 mb-8;
                opacity: 0;
                transition: opacity 0.8s ease;
            }
            .wallpaper-info.loaded {
                opacity: 1;
            }
            .snowflake {
                position: fixed;
                pointer-events: none;
                z-index: 9999;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.8);
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            .dark .snowflake {
                background: rgba(255, 255, 255, 0.9);
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
            }
            .title-image {
                @apply mx-auto rounded-lg shadow-lg max-w-full h-auto opacity-0 invisible;
                transform: translateY(20px) rotate(-2deg) scale(0.95);
                transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }
            .title-image.animate-in {
                @apply opacity-100 visible;
                transform: translateY(0) rotate(0deg) scale(1);
            }
            .title-container {
                position: relative;
                display: inline-block;
                cursor: pointer;
                --mouse-x: 50%;
                --mouse-y: 50%;
            }
            .title-light {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 60%);
                border-radius: inherit;
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            .title-light.active {
                opacity: 1;
            }
            .language-btn {
                @apply fixed top-4 z-50 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md text-gray-800 dark:text-gray-200 w-12 h-12 flex items-center justify-center rounded-full shadow-lg hover:shadow-xl transition-all duration-300 border border-gray-200/30 dark:border-gray-600/30;
                font-size: 0.875rem;
                font-weight: 500;
            }
        }
    </style>
    <script>
        let notificationOpen = false;
        let notificationTimer = null;
        let isProcessingNotification = false;
        let snowflakes = [];
        let snowflakeIdCounter = 0;
        let timeUpdateInterval = null;
        let eventListenersBound = false;
        let titleContainer = null;
        let titleLight = null;
        let isMouseOverTitle = false;
        let currentLanguage = 'zh-CN';
        
        const translations = {
            'zh-CN': {

                'githubBtn': '前往GitHub仓库',

                'notificationClose': '关闭',

                'versionText': '(版本: 3.4)',
                'creatorText': 'jjjmmmdexh制作',

                'emailLabel': 'E-MAIL',

                'wallpaperTitle': '今日壁纸',
                'wallpaperLoading': '加载中...',

                'wallpaperFallback': '备用壁纸 | 随机网络图片',
                'footerText': 'All things by jjjmmmdexh'
            },
            'zh-TW': {
                'timeBtn': '當前時間（24小時制）',
                'githubBtn': '前往GitHub倉庫',
                'darkModeBtn': '切換黑夜模式',
                'notificationBtn': '查看通知',
                'notificationTitle': '重要通知',
                'notificationContent': '由於種種原因，我宣布更新日誌不再公開。',
                'notificationClose': '關閉',
                'downloadBtn': '下載White Client',
                'versionText': '(版本: 3.4)',
                'creatorText': 'jjjmmmdexh製作',
                'contactTitle': '關於',
                'qqLabel': 'QQ',
                'emailLabel': 'E-MAIL',
                'bilibiliLabel': 'bilibili',
                'wallpaperTitle': '今日壁紙',
                'wallpaperLoading': '加載中...',
                'wallpaperError': '壁紙加載失敗，顯示純色背景',
                'wallpaperFallback': '備用壁紙 | 隨機網路圖片',
                'footerText': 'All things by jjjmmmdexh'
            },
            'en': {
                'timeBtn': 'Current Time (24h format)',
                'githubBtn': 'Go to GitHub Repository',
                'darkModeBtn': 'Toggle Dark Mode',
                'notificationBtn': 'View Notifications',
                'notificationTitle': 'Important Notice',
                'notificationContent': 'Due to various reasons, I announce that update logs will no longer be made public.',
                'notificationClose': 'Close',
                'downloadBtn': 'Download White Client',
                'versionText': '(Version: 3.4)',
                'creatorText': 'Created by jjjmmmdexh',
                'contactTitle': 'About',
                'qqLabel': 'QQ',
                'emailLabel': 'E-MAIL',
                'bilibiliLabel': 'bilibili',
                'wallpaperTitle': 'Today\'s Wallpaper',
                'wallpaperLoading': 'Loading...',
                'wallpaperError': 'Wallpaper failed to load, showing solid color background',
                'wallpaperFallback': 'Fallback Wallpaper | Random Web Image',
                'footerText': 'All things by jjjmmmdexh'
            }
        };
        
        const languageDisplay = {
            'zh-CN': '简',
            'zh-TW': '繁',
            'en': 'En'
        };
        
        const languageTitles = {
            'zh-CN': '切换语言',
            'zh-TW': '切換語言',
            'en': 'Switch Language'
        };
        
        function updateLanguageButton() {
            const languageBtn = document.getElementById('languageToggle');
            if (languageBtn) {
                languageBtn.textContent = languageDisplay[currentLanguage];
                languageBtn.title = languageTitles[currentLanguage];
            }
        }
        
        function translatePage() {
            document.getElementById('timeDisplay').title = translations[currentLanguage].timeBtn;
            document.getElementById('githubToggle').title = translations[currentLanguage].githubBtn;
            document.getElementById('darkModeToggle').title = translations[currentLanguage].darkModeBtn;
            document.getElementById('notificationToggle').title = translations[currentLanguage].notificationBtn;
            
            const notificationPanel = document.getElementById('notificationPanel');
            if (notificationPanel) {
                notificationPanel.querySelector('h3').textContent = translations[currentLanguage].notificationTitle;
                notificationPanel.querySelector('p').textContent = translations[currentLanguage].notificationContent;
                notificationPanel.querySelector('button').innerHTML = `<i class="fa fa-times mr-1"></i> ${translations[currentLanguage].notificationClose}`;
            }
            
            const downloadBtn = document.querySelector('.btn-primary');
            if (downloadBtn) {
                downloadBtn.innerHTML = `<i class="fa fa-download mr-2"></i> ${translations[currentLanguage].downloadBtn} <span class="text-sm text-gray-200">${translations[currentLanguage].versionText}</span>`;
            }
            
            const creatorText = document.querySelector('.mt-6.text-gray-600');
            if (creatorText) {
                creatorText.querySelector('p').textContent = translations[currentLanguage].creatorText;
            }
            
            const contactTitle = document.querySelector('.text-xl.font-semibold');
            if (contactTitle) {
                contactTitle.innerHTML = `<i class="fa fa-envelope text-primary mr-2"></i>${translations[currentLanguage].contactTitle}`;
            }
            
            const contactItems = document.querySelectorAll('.dark-contact-item');
            if (contactItems.length >= 3) {
                contactItems[0].querySelector('.font-medium').textContent = translations[currentLanguage].qqLabel;
                contactItems[1].querySelector('.font-medium').textContent = translations[currentLanguage].emailLabel;
                contactItems[2].querySelector('.font-medium').textContent = translations[currentLanguage].bilibiliLabel;
            }
            
            const wallpaperInfo = document.getElementById('wallpaperInfo');
            if (wallpaperInfo) {
                const infoElements = wallpaperInfo.querySelectorAll('p');
                if (infoElements.length > 0) {
                    infoElements[0].innerHTML = `<i class="fa fa-camera mr-2"></i>${translations[currentLanguage].wallpaperTitle}`;
                }
            }
            
            const footerText = document.querySelector('footer p');
            if (footerText) {
                footerText.textContent = translations[currentLanguage].footerText;
            }
            
            updateLanguageButton();
        }
        
        function toggleLanguage() {
            const languages = ['zh-CN', 'zh-TW', 'en'];
            const currentIndex = languages.indexOf(currentLanguage);
            const nextIndex = (currentIndex + 1) % languages.length;
            currentLanguage = languages[nextIndex];
            
            localStorage.setItem('preferredLanguage', currentLanguage);
            translatePage();
        }
        
        function initDarkMode() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
            
            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            
            updateToggleIcon();
            updateWallpaperFilter();
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.contains('dark');
            
            if (isDark) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            
            updateToggleIcon();
            updateWallpaperFilter();
            updateTimeDisplay();
        }
        
        function updateToggleIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            const toggleIcon = document.getElementById('darkModeIcon');
            
            if (toggleIcon) {
                toggleIcon.className = isDark ? 'fa fa-sun-o' : 'fa fa-moon-o';
            }
        }
        
        function updateWallpaperFilter() {
            const wallpaper = document.getElementById('bgWallpaper');
            if (!wallpaper) return;
            
            const isDark = document.documentElement.classList.contains('dark');
            wallpaper.style.filter = isDark ? 'brightness(0.7) contrast(1.1)' : 'brightness(0.85) contrast(1.05)';
        }
        
        function setWallpaper(url, copyright, copyrightLink) {
            return new Promise((resolve) => {
                const wallpaper = document.getElementById('bgWallpaper');
                const img = new Image();
                
                img.onload = function() {
                    wallpaper.style.backgroundImage = `url(${url})`;
                    void wallpaper.offsetWidth;
                    wallpaper.classList.add('loaded');
                    
                    const infoElement = document.getElementById('wallpaperInfo');
                    if (infoElement && copyright) {
                        infoElement.innerHTML = `
                            <p class="font-medium mb-1"><i class="fa fa-camera mr-2"></i>${translations[currentLanguage].wallpaperTitle}</p>
                            <p>${copyright}</p>
                            ${copyrightLink ? `<p class="mt-2"><a href="${copyrightLink}" target="_blank" class="text-blue-300 hover:text-blue-200 underline">查看原图</a></p>` : ''}
                        `;
                    }
                    
                    void infoElement.offsetWidth;
                    infoElement.classList.add('loaded');
                    
                    triggerTitleAnimation();
                    resolve();
                };
                
                img.onerror = function() {
                    console.warn('壁纸加载失败:', url);
                    wallpaper.style.backgroundColor = document.documentElement.classList.contains('dark') 
                        ? '#1a202c' 
                        : '#f7fafc';
                    wallpaper.classList.add('loaded');
                    
                    const infoElement = document.getElementById('wallpaperInfo');
                    if (infoElement) {
                        infoElement.innerHTML = `
                            <p class="font-medium mb-1"><i class="fa fa-camera mr-2"></i>${translations[currentLanguage].wallpaperTitle}</p>
                            <p>${translations[currentLanguage].wallpaperError}</p>
                        `;
                        infoElement.classList.add('loaded');
                    }
                    
                    triggerTitleAnimation();
                    resolve();
                };
                
                img.src = url;
            });
        }
        
        async function getBingWallpaper() {
            try {
                const apiEndpoints = [
                    'https://bing.biturl.top/?resolution=1920&format=json&index=0&mkt=zh-CN',
                    'https://bingw.jasonzeng.dev/?resolution=1920&format=json&index=0&mkt=zh-CN',
                    'https://api.xygeng.cn/Bing/url/?format=json'
                ];
                
                let data = null;
                let lastError = null;
                
                for (const endpoint of apiEndpoints) {
                    try {
                        const response = await fetch(endpoint, { timeout: 5000 });
                        
                        if (!response.ok) {
                            throw new Error(`HTTP error: ${response.status}`);
                        }
                        
                        data = await response.json();
                        
                        if (data && data.url) {
                            break;
                        } else {
                            throw new Error('Invalid data format');
                        }
                    } catch (error) {
                        lastError = error;
                        console.warn(`API ${endpoint} 失败:`, error.message);
                        continue;
                    }
                }
                
                if (data && data.url) {
                    let imageUrl = data.url;
                    if (!imageUrl.startsWith('http')) {
                        imageUrl = 'https://www.bing.com' + imageUrl;
                    }
                    
                    await setWallpaper(imageUrl, data.copyright || 'Bing每日壁纸', data.copyrightlink || data.copyrightLink);
                } else {
                    throw new Error('所有壁纸API都失败了');
                }
            } catch (error) {
                console.error('获取Bing壁纸失败:', error);
                const fallbackUrls = [
                    'https://picsum.photos/1920/1080?random=' + Date.now(),
                    'https://source.unsplash.com/random/1920x1080?nature',
                    'https://source.unsplash.com/random/1920x1080?landscape'
                ];
                
                const randomIndex = Math.floor(Math.random() * fallbackUrls.length);
                await setWallpaper(
                    fallbackUrls[randomIndex], 
                    translations[currentLanguage].wallpaperFallback,
                    null
                );
            }
        }
        
        function triggerTitleAnimation() {
            const titleImage = document.getElementById('titleImage');
            if (titleImage) {
                void titleImage.offsetWidth;
                setTimeout(() => {
                    titleImage.classList.add('animate-in');
                }, 300);
            }
        }
        
        function initTitleLightEffect() {
            titleContainer = document.querySelector('.title-container');
            titleLight = document.querySelector('.title-light');
            
            if (!titleContainer || !titleLight) {
                console.warn('标题容器或光照元素未找到');
                return;
            }
            
            titleContainer.addEventListener('mouseenter', function() {
                isMouseOverTitle = true;
                titleLight.classList.add('active');
            });
            
            titleContainer.addEventListener('mousemove', function(e) {
                if (!isMouseOverTitle) {
                    isMouseOverTitle = true;
                    titleLight.classList.add('active');
                }
                
                const rect = titleContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                titleContainer.style.setProperty('--mouse-x', `${x}px`);
                titleContainer.style.setProperty('--mouse-y', `${y}px`);
                
                if (!titleLight.classList.contains('active')) {
                    titleLight.classList.add('active');
                }
            });
            
            titleContainer.addEventListener('mouseleave', function() {
                isMouseOverTitle = false;
                titleLight.classList.remove('active');
            });
            
            titleContainer.addEventListener('mouseout', function(e) {
                const rect = titleContainer.getBoundingClientRect();
                const x = e.clientX;
                const y = e.clientY;
                
                if (x < rect.left || x > rect.right || y < rect.top || y > rect.bottom) {
                    isMouseOverTitle = false;
                    titleLight.classList.remove('active');
                }
            });
        }
        
        function toggleNotification() {
            if (isProcessingNotification) return;
            isProcessingNotification = true;

            const panel = document.getElementById('notificationPanel');
            const icon = document.getElementById('notificationIcon');
            
            clearTimeout(notificationTimer);
            
            if (notificationOpen) {
                panel.classList.add('closing');
                icon.classList.remove('fa-bell-slash');
                icon.classList.add('fa-bell');
                
                setTimeout(() => {
                    panel.classList.remove('open', 'closing');
                    notificationOpen = false;
                    isProcessingNotification = false;
                }, 400);
            } else {
                panel.classList.add('open');
                icon.classList.remove('fa-bell');
                icon.classList.add('fa-bell-slash');
                
                notificationTimer = setTimeout(() => {
                    if (notificationOpen) {
                        toggleNotification();
                    }
                }, 8000);
                
                notificationOpen = true;
                isProcessingNotification = false;
            }
        }
        
        function handleDocumentClick(event) {
            const panel = document.getElementById('notificationPanel');
            const toggleBtn = document.getElementById('notificationToggle');
            
            if (notificationOpen && !isProcessingNotification &&
                !panel.contains(event.target) && 
                event.target !== toggleBtn && 
                !toggleBtn.contains(event.target)) {
                toggleNotification();
            }
        }
        
        function createSnowflake(x, y) {
            const size = Math.random() * 5 + 3;
            const id = `snowflake-${snowflakeIdCounter++}`;
            
            const snowflake = document.createElement('div');
            snowflake.id = id;
            snowflake.className = 'snowflake';
            snowflake.style.width = `${size}px`;
            snowflake.style.height = `${size}px`;
            snowflake.style.left = `${x}px`;
            snowflake.style.top = `${y}px`;
            snowflake.style.opacity = '1';
            
            document.body.appendChild(snowflake);
            
            const snowflakeInfo = {
                id,
                element: snowflake,
                x,
                y,
                size,
                velocityX: (Math.random() - 0.5) * 2,
                velocityY: Math.random() * 1 + 1,
                rotation: Math.random() * 360,
                rotationSpeed: (Math.random() - 0.5) * 2
            };
            
            snowflakes.push(snowflakeInfo);
            
            setTimeout(() => {
                removeSnowflake(id);
            }, 5000);
            
            return snowflakeInfo;
        }

        function updateSnowflakes() {
            for (let i = snowflakes.length - 1; i >= 0; i--) {
                const snowflake = snowflakes[i];
                
                snowflake.x += snowflake.velocityX;
                snowflake.y += snowflake.velocityY;
                
                snowflake.rotation += snowflake.rotationSpeed;
                
                snowflake.element.style.left = `${snowflake.x}px`;
                snowflake.element.style.top = `${snowflake.y}px`;
                snowflake.element.style.transform = `rotate(${snowflake.rotation}deg)`;
                
                const lifeProgress = 1 - (snowflake.y / window.innerHeight);
                snowflake.element.style.opacity = lifeProgress > 0 ? lifeProgress : 0;
                
                if (snowflake.y > window.innerHeight) {
                    removeSnowflake(snowflake.id);
                }
            }
            
            requestAnimationFrame(updateSnowflakes);
        }

        function removeSnowflake(id) {
            snowflakes = snowflakes.filter(s => s.id !== id);
            
            const element = document.getElementById(id);
            if (element) {
                element.style.opacity = '0';
                setTimeout(() => {
                    if (element.parentNode) {
                        element.remove();
                    }
                }, 300);
            }
        }

        function handleClick(event) {
            const target = event.target;
            if (target.closest('#darkModeToggle') || target.closest('#notificationToggle') || target.closest('#timeDisplay') || target.closest('#githubToggle') || target.closest('#languageToggle')) {
                return;
            }
            
            const count = Math.floor(Math.random() * 6) + 5;
            for (let i = 0; i < count; i++) {
                const offsetX = (Math.random() - 0.5) * 20;
                const offsetY = (Math.random() - 0.5) * 20;
                createSnowflake(event.clientX + offsetX, event.clientY + offsetY);
            }
        }
        
        function updateTimeDisplay() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const timeString = `${hours}:${minutes}:${seconds}`;
            const timeElement = document.getElementById('timeDisplay');
            
            if (timeElement) {
                timeElement.textContent = timeString;
            }
        }

        function startTimeUpdates() {
            updateTimeDisplay();
            
            if (timeUpdateInterval) {
                clearInterval(timeUpdateInterval);
            }
            
            timeUpdateInterval = setInterval(updateTimeDisplay, 1000);
        }
        
        function initializeApp() {
            if (eventListenersBound) return;
            
            const savedLanguage = localStorage.getItem('preferredLanguage');
            if (savedLanguage && translations[savedLanguage]) {
                currentLanguage = savedLanguage;
            }
            
            initDarkMode();
            startTimeUpdates();
            
            document.getElementById('darkModeToggle').addEventListener('click', toggleDarkMode);
            document.getElementById('notificationToggle').addEventListener('click', toggleNotification);
            document.getElementById('languageToggle').addEventListener('click', toggleLanguage);
            
            document.addEventListener('click', handleClick);
            
            initTitleLightEffect();
            
            getBingWallpaper().catch(error => {
                console.error('壁纸加载失败:', error);
                triggerTitleAnimation();
            });
            
            updateSnowflakes();
            
            document.addEventListener('click', handleDocumentClick);
            
            translatePage();
            
            eventListenersBound = true;
        }
        
        function handleImageError(img) {
            console.warn('图片加载失败:', img.src);
            img.style.display = 'none';
            
            const parent = img.parentElement;
            if (parent && parent.classList.contains('title-container')) {
                const altText = document.createElement('div');
                altText.className = 'text-center py-8';
                altText.innerHTML = `
                    <h1 class="text-4xl font-bold text-gray-800 dark:text-white mb-2">White Client</h1>
                `;
                parent.appendChild(altText);
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const titleImage = document.getElementById('titleImage');
            if (titleImage) {
                titleImage.addEventListener('error', function() {
                    handleImageError(this);
                });
                
                if (titleImage.complete && titleImage.naturalHeight === 0) {
                    handleImageError(titleImage);
                }
            }
            
            initializeApp();
        });
        
        window.addEventListener('resize', function() {
            for (let i = snowflakes.length - 1; i >= 0; i--) {
                const snowflake = snowflakes[i];
                if (snowflake.x > window.innerWidth || snowflake.y > window.innerHeight) {
                    removeSnowflake(snowflake.id);
                }
            }
        });
    </script>
</head>
