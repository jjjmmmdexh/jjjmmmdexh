<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Client</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#007bff',
                        secondary: '#6c757d',
                        dark: '#343a40',
                        light: '#f8f9fa',
                        bilibili: '#00A1D6' // Bilibili品牌蓝色
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .device-card {
                /* 亚克力/毛玻璃效果 */
                @apply bg-white/80 dark:bg-gray-800/80 backdrop-blur-md rounded-xl shadow-md p-6 transition-all duration-300 hover:shadow-lg border border-white/20 dark:border-gray-700/20;
            }
            .btn-primary {
                /* 亚克力下载按钮 - 调整透明度+圆形 */
                @apply bg-primary/70 hover:bg-primary/80 text-white font-medium py-3 px-8 rounded-full transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-primary/50 backdrop-blur-md border border-white/20 dark:border-primary/30;
            }
            .section-padding {
                @apply py-8 md:py-12;
            }
            .contact-card {
                /* 亚克力/毛玻璃效果 */
                @apply bg-gradient-to-r from-blue-50/80 to-indigo-50/80 dark:from-gray-700/80 dark:to-gray-600/80 backdrop-blur-md rounded-xl shadow-md p-6 border border-blue-100/30 dark:border-gray-600/30;
            }
            
            /* 圆形按钮样式（时间+黑夜模式+通知按钮）- 亚克力效果 */
            .circle-btn {
                @apply fixed top-4 z-50 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md text-gray-800 dark:text-gray-200 w-12 h-12 flex items-center justify-center rounded-full shadow-lg hover:shadow-xl transition-all duration-300 border border-gray-200/30 dark:border-gray-600/30;
            }
            
            /* 时间显示按钮特殊样式 */
            .time-btn {
                @apply font-mono text-sm md:text-base tracking-wider;
                min-width: 120px;
                width: auto;
                padding: 0 1rem;
            }
            
            /* 通知栏样式 - 青柠起始页倾斜动画效果 */
            .notification-panel {
                @apply fixed top-16 right-4 z-40 bg-white/90 dark:bg-gray-800/90 backdrop-blur-md rounded-xl shadow-xl p-5 border border-gray-200/30 dark:border-gray-700/30 max-w-xs opacity-0 invisible;
                transform: translateX(20px) rotate(2deg) scale(0.95);
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }
            
            .notification-panel.open {
                @apply opacity-100 visible;
                transform: translateX(0) rotate(0deg) scale(1);
            }
            
            .notification-panel.closing {
                transform: translateX(20px) rotate(-2deg) scale(0.95);
                @apply opacity-0 invisible;
            }
            
            /* 黑夜模式下的背景和文字颜色 */
            .dark-bg {
                @apply bg-gray-50 dark:bg-gray-900 transition-colors duration-300;
            }
            
            .dark-text {
                @apply text-gray-700 dark:text-gray-300;
            }
            
            .dark-text-secondary {
                @apply text-secondary dark:text-gray-400;
            }
            
            .dark-info-bg {
                /* 亚克力/毛玻璃效果 */
                @apply bg-gray-50/80 dark:bg-gray-700/80 backdrop-blur-md;
            }
            
            .dark-contact-item {
                /* 亚克力/毛玻璃效果 */
                @apply bg-white/80 dark:bg-gray-700/80 backdrop-blur-sm shadow-sm dark:shadow-gray-800 border border-white/20 dark:border-gray-800/20 rounded-lg;
            }
            
            /* 统一的图标背景样式 */
            .icon-bg {
                @apply bg-blue-100/80 dark:bg-blue-800/80 backdrop-blur-sm w-12 h-12 flex items-center justify-center rounded-full mr-3;
            }
            
            /* 统一的图标颜色样式 */
            .icon-color {
                @apply text-blue-600 dark:text-blue-300 text-xl;
            }
            
            /* 背景壁纸样式 */
            .bg-wallpaper {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1;
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                filter: brightness(0.85) contrast(1.05);
                transition: filter 0.5s ease;
                opacity: 0;
                transform: scale(1.05);
                transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }
            
            .bg-wallpaper.loaded {
                opacity: 1;
                transform: scale(1);
            }
            
            .dark .bg-wallpaper {
                filter: brightness(0.7) contrast(1.1);
            }
            
            /* 壁纸信息卡片样式 */
            .wallpaper-info {
                @apply bg-black/60 backdrop-blur-md text-white p-4 rounded-lg text-sm md:text-base max-w-3xl mx-auto mt-6 mb-8;
                opacity: 0;
                transition: opacity 0.8s ease;
            }
            
            .wallpaper-info.loaded {
                opacity: 1;
            }
            
            /* 雪花效果样式 */
            .snowflake {
                position: fixed;
                pointer-events: none;
                z-index: 9999;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.8);
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            
            .dark .snowflake {
                background: rgba(255, 255, 255, 0.9);
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
            }
            
            /* 标题图片动画样式 */
            .title-image {
                @apply mx-auto rounded-lg shadow-lg max-w-full h-auto opacity-0 invisible;
                transform: translateY(20px) rotate(-2deg) scale(0.95);
                transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }
            
            .title-image.animate-in {
                @apply opacity-100 visible;
                transform: translateY(0) rotate(0deg) scale(1);
            }
            
            /* 标题鼠标跟随照亮效果容器 */
            .title-container {
                position: relative;
                display: inline-block;
                cursor: pointer;
                --mouse-x: 50%;
                --mouse-y: 50%;
            }
            
            /* 鼠标跟随的照亮效果 */
            .title-light {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 60%);
                border-radius: inherit;
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            
            /* 修复：使用JS控制显示，而不是CSS hover */
            .title-light.active {
                opacity: 1;
            }
        }
    </style>
    <script>
        // 全局变量 - 防止通知反复弹出
        let notificationOpen = false;
        let notificationTimer = null;
        let isProcessingNotification = false;

        // 雪花效果相关变量
        let snowflakes = [];
        let snowflakeIdCounter = 0;

        // 时间显示相关变量
        let timeUpdateInterval = null;
        
        // 事件监听器标志，避免重复绑定
        let eventListenersBound = false;
        
        // 标题光照效果相关变量
        let titleContainer = null;
        let titleLight = null;
        let isMouseOverTitle = false;

        // 黑夜模式相关函数
        function initDarkMode() {
            // 从localStorage获取保存的主题设置
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            // 如果有保存的设置就使用，否则使用系统偏好
            const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
            
            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            
            updateToggleIcon();
            updateWallpaperFilter(); // 更新壁纸滤镜
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.contains('dark');
            
            if (isDark) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            
            updateToggleIcon();
            updateWallpaperFilter(); // 更新壁纸滤镜
            updateTimeDisplay(); // 切换主题后更新时间显示
        }
        
        function updateToggleIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            const toggleIcon = document.getElementById('darkModeIcon');
            
            if (toggleIcon) {
                toggleIcon.className = isDark ? 'fa fa-sun-o' : 'fa fa-moon-o';
            }
        }
        
        // 更新壁纸滤镜效果
        function updateWallpaperFilter() {
            const wallpaper = document.getElementById('bgWallpaper');
            if (!wallpaper) return;
            
            const isDark = document.documentElement.classList.contains('dark');
            wallpaper.style.filter = isDark ? 'brightness(0.7) contrast(1.1)' : 'brightness(0.85) contrast(1.05)';
        }
        
        // 设置壁纸的通用函数
        function setWallpaper(url, copyright, copyrightLink) {
            return new Promise((resolve) => {
                const wallpaper = document.getElementById('bgWallpaper');
                const img = new Image();
                
                img.onload = function() {
                    wallpaper.style.backgroundImage = `url(${url})`;
                    
                    // 添加强制重绘
                    void wallpaper.offsetWidth;
                    wallpaper.classList.add('loaded');
                    
                    // 显示壁纸信息并添加淡入动画
                    const infoElement = document.getElementById('wallpaperInfo');
                    if (infoElement && copyright) {
                        infoElement.innerHTML = `
                            <p class="font-medium mb-1"><i class="fa fa-camera mr-2"></i>今日壁纸</p>
                            <p>${copyright}</p>
                            ${copyrightLink ? `<p class="mt-2"><a href="${copyrightLink}" target="_blank" class="text-blue-300 hover:text-blue-200 underline">查看原图</a></p>` : ''}
                        `;
                    }
                    
                    // 添加强制重绘
                    void infoElement.offsetWidth;
                    infoElement.classList.add('loaded');
                    
                    // 壁纸加载完成后触发标题动画
                    triggerTitleAnimation();
                    resolve();
                };
                
                img.onerror = function() {
                    console.warn('壁纸加载失败:', url);
                    // 如果备用图片也加载失败，使用纯色背景
                    wallpaper.style.backgroundColor = document.documentElement.classList.contains('dark') 
                        ? '#1a202c' 
                        : '#f7fafc';
                    wallpaper.classList.add('loaded');
                    
                    const infoElement = document.getElementById('wallpaperInfo');
                    if (infoElement) {
                        infoElement.innerHTML = `
                            <p class="font-medium mb-1"><i class="fa fa-camera mr-2"></i>今日壁纸</p>
                            <p>壁纸加载失败，显示纯色背景</p>
                        `;
                        infoElement.classList.add('loaded');
                    }
                    
                    triggerTitleAnimation();
                    resolve();
                };
                
                img.src = url;
            });
        }
        
        // 获取每日Bing壁纸
        async function getBingWallpaper() {
            try {
                // 尝试多个Bing壁纸API端点
                const apiEndpoints = [
                    'https://bing.biturl.top/?resolution=1920&format=json&index=0&mkt=zh-CN',
                    'https://bingw.jasonzeng.dev/?resolution=1920&format=json&index=0&mkt=zh-CN',
                    'https://api.xygeng.cn/Bing/url/?format=json'
                ];
                
                let data = null;
                let lastError = null;
                
                // 尝试每个API端点，直到有一个成功
                for (const endpoint of apiEndpoints) {
                    try {
                        const response = await fetch(endpoint, { timeout: 5000 });
                        
                        if (!response.ok) {
                            throw new Error(`HTTP error: ${response.status}`);
                        }
                        
                        data = await response.json();
                        
                        // 检查返回的数据格式
                        if (data && data.url) {
                            break;
                        } else {
                            throw new Error('Invalid data format');
                        }
                    } catch (error) {
                        lastError = error;
                        console.warn(`API ${endpoint} 失败:`, error.message);
                        continue;
                    }
                }
                
                if (data && data.url) {
                    // 确保URL是完整的
                    let imageUrl = data.url;
                    if (!imageUrl.startsWith('http')) {
                        imageUrl = 'https://www.bing.com' + imageUrl;
                    }
                    
                    await setWallpaper(imageUrl, data.copyright || 'Bing每日壁纸', data.copyrightlink || data.copyrightLink);
                } else {
                    throw new Error('所有壁纸API都失败了');
                }
            } catch (error) {
                console.error('获取Bing壁纸失败:', error);
                // 备用壁纸方案
                const fallbackUrls = [
                    'https://picsum.photos/1920/1080?random=' + Date.now(),
                    'https://source.unsplash.com/random/1920x1080?nature',
                    'https://source.unsplash.com/random/1920x1080?landscape'
                ];
                
                const randomIndex = Math.floor(Math.random() * fallbackUrls.length);
                await setWallpaper(
                    fallbackUrls[randomIndex], 
                    '备用壁纸 | 随机网络图片',
                    null
                );
            }
        }
        
        // 触发标题入场动画
        function triggerTitleAnimation() {
            const titleImage = document.getElementById('titleImage');
            if (titleImage) {
                // 添加强制重绘确保动画生效
                void titleImage.offsetWidth;
                // 延迟一点触发，让壁纸动画先开始
                setTimeout(() => {
                    titleImage.classList.add('animate-in');
                }, 300);
            }
        }
        
        // 修复标题鼠标跟随照亮效果问题
        function initTitleLightEffect() {
            titleContainer = document.querySelector('.title-container');
            titleLight = document.querySelector('.title-light');
            
            if (!titleContainer || !titleLight) {
                console.warn('标题容器或光照元素未找到');
                return;
            }
            
            // 鼠标进入标题区域
            titleContainer.addEventListener('mouseenter', function() {
                isMouseOverTitle = true;
                titleLight.classList.add('active');
            });
            
            // 鼠标在标题区域移动
            titleContainer.addEventListener('mousemove', function(e) {
                if (!isMouseOverTitle) {
                    isMouseOverTitle = true;
                    titleLight.classList.add('active');
                }
                
                const rect = titleContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // 设置CSS变量，控制径向渐变的位置
                titleContainer.style.setProperty('--mouse-x', `${x}px`);
                titleContainer.style.setProperty('--mouse-y', `${y}px`);
                
                // 确保光照效果是可见的
                if (!titleLight.classList.contains('active')) {
                    titleLight.classList.add('active');
                }
            });
            
            // 鼠标离开标题区域
            titleContainer.addEventListener('mouseleave', function() {
                isMouseOverTitle = false;
                titleLight.classList.remove('active');
            });
            
            // 防止快速移动时可能丢失事件
            titleContainer.addEventListener('mouseout', function(e) {
                // 检查鼠标是否真的离开了容器
                const rect = titleContainer.getBoundingClientRect();
                const x = e.clientX;
                const y = e.clientY;
                
                // 如果鼠标位置在容器外部
                if (x < rect.left || x > rect.right || y < rect.top || y > rect.bottom) {
                    isMouseOverTitle = false;
                    titleLight.classList.remove('active');
                }
            });
        }
        
        // 通知栏相关函数 - 修复反复弹出问题
        function toggleNotification() {
            // 防止快速重复点击
            if (isProcessingNotification) return;
            isProcessingNotification = true;

            const panel = document.getElementById('notificationPanel');
            const icon = document.getElementById('notificationIcon');
            
            // 清除自动关闭定时器
            clearTimeout(notificationTimer);
            
            if (notificationOpen) {
                // 关闭通知栏 - 反向倾斜动画
                panel.classList.add('closing');
                icon.classList.remove('fa-bell-slash');
                icon.classList.add('fa-bell');
                
                setTimeout(() => {
                    panel.classList.remove('open', 'closing');
                    notificationOpen = false;
                    isProcessingNotification = false;
                }, 400);
            } else {
                // 打开通知栏 - 倾斜动画
                panel.classList.add('open');
                icon.classList.remove('fa-bell');
                icon.classList.add('fa-bell-slash');
                
                // 自动关闭（8秒）
                notificationTimer = setTimeout(() => {
                    if (notificationOpen) {
                        toggleNotification();
                    }
                }, 8000);
                
                notificationOpen = true;
                isProcessingNotification = false;
            }
        }
        
        // 点击页面其他区域关闭通知栏
        function handleDocumentClick(event) {
            const panel = document.getElementById('notificationPanel');
            const toggleBtn = document.getElementById('notificationToggle');
            
            if (notificationOpen && !isProcessingNotification &&
                !panel.contains(event.target) && 
                event.target !== toggleBtn && 
                !toggleBtn.contains(event.target)) {
                toggleNotification();
            }
        }

        // ==================== 雪花效果相关函数 ====================
        function createSnowflake(x, y) {
            // 生成随机大小的雪花 (3-8px)
            const size = Math.random() * 5 + 3;
            const id = `snowflake-${snowflakeIdCounter++}`;
            
            // 创建雪花元素
            const snowflake = document.createElement('div');
            snowflake.id = id;
            snowflake.className = 'snowflake';
            snowflake.style.width = `${size}px`;
            snowflake.style.height = `${size}px`;
            snowflake.style.left = `${x}px`;
            snowflake.style.top = `${y}px`;
            snowflake.style.opacity = '1';
            
            // 添加到页面
            document.body.appendChild(snowflake);
            
            // 存储雪花信息
            const snowflakeInfo = {
                id,
                element: snowflake,
                x,
                y,
                size,
                velocityX: (Math.random() - 0.5) * 2, // 水平速度 (-1 到 1)
                velocityY: Math.random() * 1 + 1,      // 垂直速度 (1 到 2)
                rotation: Math.random() * 360,         // 初始旋转角度
                rotationSpeed: (Math.random() - 0.5) * 2 // 旋转速度 (-1 到 1)
            };
            
            snowflakes.push(snowflakeInfo);
            
            // 5秒后移除雪花
            setTimeout(() => {
                removeSnowflake(id);
            }, 5000);
            
            return snowflakeInfo;
        }

        function updateSnowflakes() {
            // 更新所有雪花的位置和状态
            for (let i = snowflakes.length - 1; i >= 0; i--) {
                const snowflake = snowflakes[i];
                
                // 更新位置
                snowflake.x += snowflake.velocityX;
                snowflake.y += snowflake.velocityY;
                
                // 更新旋转
                snowflake.rotation += snowflake.rotationSpeed;
                
                // 应用样式
                snowflake.element.style.left = `${snowflake.x}px`;
                snowflake.element.style.top = `${snowflake.y}px`;
                snowflake.element.style.transform = `rotate(${snowflake.rotation}deg)`;
                
                // 淡出效果
                const lifeProgress = 1 - (snowflake.y / window.innerHeight);
                snowflake.element.style.opacity = lifeProgress > 0 ? lifeProgress : 0;
                
                // 如果雪花超出屏幕底部，移除它
                if (snowflake.y > window.innerHeight) {
                    removeSnowflake(snowflake.id);
                }
            }
            
            // 继续更新
            requestAnimationFrame(updateSnowflakes);
        }

        function removeSnowflake(id) {
            // 从数组中移除
            snowflakes = snowflakes.filter(s => s.id !== id);
            
            // 从DOM中移除
            const element = document.getElementById(id);
            if (element) {
                element.style.opacity = '0';
                setTimeout(() => {
                    if (element.parentNode) {
                        element.remove();
                    }
                }, 300);
            }
        }

        function handleClick(event) {
            // 防止在按钮上点击时触发雪花效果
            const target = event.target;
            if (target.closest('#darkModeToggle') || target.closest('#notificationToggle') || target.closest('#timeDisplay')) {
                return;
            }
            
            // 在点击位置创建多个雪花 (5-10个)
            const count = Math.floor(Math.random() * 6) + 5;
            for (let i = 0; i < count; i++) {
                // 稍微偏移位置，让雪花散开
                const offsetX = (Math.random() - 0.5) * 20;
                const offsetY = (Math.random() - 0.5) * 20;
                createSnowflake(event.clientX + offsetX, event.clientY + offsetY);
            }
        }

        // ==================== 时间显示相关函数 ====================
        function updateTimeDisplay() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const timeString = `${hours}:${minutes}:${seconds}`;
            const timeElement = document.getElementById('timeDisplay');
            
            if (timeElement) {
                timeElement.textContent = timeString;
            }
        }

        function startTimeUpdates() {
            // 立即更新一次
            updateTimeDisplay();
            
            // 每秒更新一次
            if (timeUpdateInterval) {
                clearInterval(timeUpdateInterval);
            }
            
            timeUpdateInterval = setInterval(updateTimeDisplay, 1000);
        }
        
        // 初始化所有功能
        function initializeApp() {
            // 如果已经绑定过事件监听器，则不再绑定
            if (eventListenersBound) return;
            
            // 初始化黑夜模式
            initDarkMode();
            
            // 启动时间更新
            startTimeUpdates();
            
            // 添加事件监听
            document.getElementById('darkModeToggle').addEventListener('click', toggleDarkMode);
            document.getElementById('notificationToggle').addEventListener('click', toggleNotification);
            
            // 初始化雪花效果
            document.addEventListener('click', handleClick);
            
            // 初始化标题鼠标跟随效果
            initTitleLightEffect();
            
            // 加载Bing壁纸（不阻塞页面加载）
            getBingWallpaper().catch(error => {
                console.error('壁纸加载失败:', error);
                // 即使壁纸加载失败，也要确保页面可用
                triggerTitleAnimation();
            });
            
            // 启动雪花动画循环
            updateSnowflakes();
            
            // 添加全局点击事件监听器来关闭通知

        function handleImageError(img) {
            console.warn('图片加载失败:', img.src);
            img.style.display = 'none';
            
            // 显示替代文本
            const parent = img.parentElement;
            if (parent && parent.classList.contains('title-container')) {
                const altText = document.createElement('div');
                altText.className = 'text-center py-8';
                altText.innerHTML = `
                    <h1 class="text-4xl font-bold text-gray-800 dark:text-white mb-2">White Client</h1>
                    <p class="text-gray-600 dark:text-gray-300">开放*创新</p>
                `;
                parent.appendChild(altText);
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 为标题图片添加错误处理
            const titleImage = document.getElementById('titleImage');
            if (titleImage) {
                titleImage.addEventListener('error', function() {
                    handleImageError(this);
                });
                
                // 如果图片已经加载完成但出错
                if (titleImage.complete && titleImage.naturalHeight === 0) {
                    handleImageError(titleImage);
                }
            }
            
            // 初始化应用
            initializeApp();
        });
        
        // 窗口大小变化时重新调整雪花位置（防止超出屏幕）
        window.addEventListener('resize', function() {
            // 移除超出屏幕的雪花
            for (let i = snowflakes.length - 1; i >= 0; i--) {
                const snowflake = snowflakes[i];
                if (snowflake.x > window.innerWidth || snowflake.y > window.innerHeight) {
                    removeSnowflake(snowflake.id);
                }
            }
        });
    </script>
